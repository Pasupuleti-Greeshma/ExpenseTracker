<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="login.css">
</head>

<body>
    <form class="profile" id="loginForm">
        <label for="input1" class="email">Email</label>
        <input id="email" class="input1" type="text" placeholder="Enter your email" required>
        <label for="input2" class="p">Password</label>
        <input id="password" class="input2" type="password" placeholder="Enter your password" required>
        <a href="forgotpassword.html">
            <label for="input2" class="fp">Forgot password?</label>
        </a>
        <button class="button" type="submit"> Login </button>

    </form>
    <script src="login.js"></script>
</body>

</html>
